ktor {
    # Defaults to false (required for App Engine — dev mode enables classpath
    # watching/autoreload that doesn't belong in a deployed fat jar). Local runs
    # via `./gradlew :server:run -Pdevelopment` still enable it: the JVM system
    # property set in build.gradle.kts (`-Dio.ktor.development=...`) overrides
    # this file's value, since system properties take priority in Typesafe Config.
    development = false
    deployment {
        port = 8080
        # Cloud Run injects PORT (defaults to 8080 itself, so this is a no-op
        # today, but binds correctly if that default ever changes).
        port = ${?PORT}
    }
    application {
        modules = [ com.ist.instocktracker.ApplicationKt.module ]
    }
}

storage {
    projectId = "instocktracker-464721"
    projectId = ${?GAE_APPLICATION}
    location = "europe-west3"
    location = ${?APP_LOCATION}
}

app {
    # Secrets (schedulerCallerSa, gemini.apiKey, browserlessioToken) are no longer
    # stored here. They are read in AppConfig.kt from a local `.env` file in dev,
    # and from environment variables (Secret Manager -> Cloud Run) in production.
    host = "https://instocktracker-server-646354819394.europe-west3.run.app/"
    jwt {
        secret = "dev-secret-change-me"
        issuer = "instocktracker-server"
        audience = "instocktracker-clients"
        realm = "instocktracker"
        accessTokenTtlSec = 3600
        refreshTokenTtlSec = 2592000
    }
}