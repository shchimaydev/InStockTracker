ktor {
    development = true
    deployment {
        port = 8080
    }
    application {
        modules = [ com.ist.instocktracker.ApplicationKt.module ]
    }
}

storage {
    projectId = "instocktracker-464721"
    projectId = ${?GAE_APPLICATION}
    location = "europe-west3"
    location = ${?APP_LOCATION}
}

app {
    # Secrets (schedulerCallerSa, gemini.apiKey, browserlessioToken) are no longer
    # stored here. They are read in AppConfig.kt from a local `.env` file in dev,
    # and from environment variables (env_secrets.yaml -> app.yaml) in production.
    host = "https://instocktracker-464721.ey.r.appspot.com/"
    jwt {
        secret = "dev-secret-change-me"
        issuer = "instocktracker-server"
        audience = "instocktracker-clients"
        realm = "instocktracker"
        accessTokenTtlSec = 3600
        refreshTokenTtlSec = 2592000
    }
}